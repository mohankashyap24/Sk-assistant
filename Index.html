<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SK Assistant"/>
<meta name="theme-color" content="#0a0a0f"/>
<link rel="manifest" href="manifest.json"/>
<title>SK Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24;
  --border:#2a2a3a; --accent:#7c6af7; --accent2:#4fd1c5;
  --text:#e8e8f0; --text-muted:#666680;
  --user-bubble:#1e1e2e; --ai-bubble:#13131e; --danger:#f87171;
  --search-color:#f6ad55;
}
body.light-mode {
  --bg:#f0f0f8; --surface:#ffffff; --surface2:#e8e8f4;
  --border:#d0d0e0; --accent:#6a58e8; --accent2:#2bb8a8;
  --text:#1a1a2e; --text-muted:#7070a0;
  --user-bubble:#e8e8f4; --ai-bubble:#f5f5fc; --danger:#e05555;
  --search-color:#c87020;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px;text-align:center;position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(124,106,247,0.15) 0%,transparent 70%);pointer-events:none;}
.login-card::after{content:'';position:absolute;bottom:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(79,209,197,0.1) 0%,transparent 70%);pointer-events:none;}
.logo-mark{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;box-shadow:0 0 40px rgba(124,106,247,0.3);}
.login-title{font-size:26px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{color:var(--text-muted);font-size:13px;margin-bottom:28px;line-height:1.5;}
#google-signin-btn{width:100%;padding:13px 20px;background:#fff;color:#1f1f1f;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
#google-signin-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.4);}
#google-signin-btn svg{width:18px;height:18px;flex-shrink:0;}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text-muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.manual-section{text-align:left;}
.manual-section label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.input-group{margin-bottom:12px;}
.input-group input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
.input-group input:focus{border-color:var(--accent);}
.input-group input::placeholder{color:var(--text-muted);}
#manual-login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#5a4fcf);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;}
#manual-login-btn:hover{opacity:0.9;transform:translateY(-1px);}
.login-note{margin-top:16px;font-size:11px;color:var(--text-muted);}

/* APP */
#app{display:none;flex-direction:column;height:100vh;}
#app.visible{display:flex;}

/* HEADER */
.header{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;overflow:hidden;}
.header-logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.header-title{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.model-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent2);font-family:'JetBrains Mono',monospace;}
@media(max-width:600px){.model-badge{display:none;} #memory-badge{display:none !important;} #search-status-badge{font-size:10px;padding:2px 6px;}}
.search-badge{background:rgba(246,173,85,0.1);border:1px solid rgba(246,173,85,0.3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--search-color);font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.2s;}
.search-badge:hover{background:rgba(246,173,85,0.2);}
.search-badge.active{background:rgba(246,173,85,0.2);border-color:var(--search-color);}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;overflow:hidden;flex-shrink:0;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
@media(max-width:600px){.sidebar{display:none;}}
.sidebar-header{padding:14px;border-bottom:1px solid var(--border);}
#new-chat-btn{width:100%;padding:9px 12px;background:linear-gradient(135deg,var(--accent),#5a4fcf);color:#fff;border:none;border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity 0.2s;}
#new-chat-btn:hover{opacity:0.85;}
.chat-history{flex:1;overflow-y:auto;padding:6px;}
.chat-history::-webkit-scrollbar{width:3px;}
.chat-history::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.history-section-label{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);padding:8px 10px 4px;opacity:0.6;}
.history-item{padding:8px 11px;border-radius:7px;font-size:13px;color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;display:flex;align-items:center;gap:6px;position:relative;group:true;}
.history-item:hover,.history-item.active{background:var(--surface2);color:var(--text);}
.history-item .chat-icon{font-size:12px;flex-shrink:0;opacity:0.7;}
.history-item .chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-item .delete-btn{display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px 4px;border-radius:4px;font-size:13px;line-height:1;flex-shrink:0;}
.history-item:hover .delete-btn{display:block;}
.history-item .delete-btn:hover{color:var(--danger);}
.sidebar-footer{padding:10px;border-top:1px solid var(--border);}
#logout-btn{width:100%;padding:8px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:7px;font-family:'Syne',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px;}
#logout-btn:hover{color:var(--danger);border-color:var(--danger);}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:30px 20px;gap:14px;}
.welcome-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 0 50px rgba(124,106,247,0.25);animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 50px rgba(124,106,247,0.25);}50%{box-shadow:0 0 70px rgba(124,106,247,0.45);}}
.welcome h2{font-size:22px;font-weight:800;}
.welcome p{color:var(--text-muted);font-size:14px;max-width:320px;line-height:1.6;}
.suggestions{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:460px;margin-top:6px;}
.suggestion-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:13px;color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
.suggestion-chip:hover{border-color:var(--accent);color:var(--text);background:rgba(124,106,247,0.1);}
.message{display:flex;gap:10px;max-width:760px;width:100%;margin:0 auto;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.message.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px;overflow:hidden;}
.message.user .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.message.ai .msg-avatar{background:linear-gradient(135deg,#2d2d3f,#1a1a2e);border:1px solid var(--border);font-size:15px;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg-content{flex:1;min-width:0;}
.msg-name{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px;}
.message.user .msg-name{text-align:right;color:var(--accent);}
.message.ai .msg-name{color:var(--accent2);}
.msg-bubble{padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;}
.message.user .msg-bubble{background:var(--user-bubble);border:1px solid var(--border);border-top-right-radius:4px;}
.message.ai .msg-bubble{background:var(--ai-bubble);border:1px solid var(--border);border-top-left-radius:4px;}
.msg-bubble pre{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:7px;padding:10px;margin:7px 0;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.5;}
.msg-bubble code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(124,106,247,0.15);padding:2px 5px;border-radius:4px;color:var(--accent2);}
.msg-bubble pre code{background:none;padding:0;color:var(--text);}
.typing-indicator{display:flex;gap:4px;padding:4px 0;align-items:center;}
.typing-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:typing 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;background:var(--accent2);}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,100%{transform:translateY(0);opacity:0.4;}50%{transform:translateY(-5px);opacity:1;}}
.msg-actions{margin-top:5px;display:flex;gap:4px;}
.tts-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:3px 7px;border-radius:5px;font-family:'Syne',sans-serif;font-size:11px;display:inline-flex;align-items:center;gap:4px;transition:all 0.2s;}
.tts-btn:hover{color:var(--accent2);background:rgba(79,209,197,0.1);}
.tts-btn.speaking{color:var(--accent2);animation:speakPulse 0.8s ease-in-out infinite;}
@keyframes speakPulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

/* SEARCH RESULTS CARD */
.search-results-card{background:rgba(246,173,85,0.05);border:1px solid rgba(246,173,85,0.2);border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:13px;}
.search-results-card .search-header{font-size:11px;color:var(--search-color);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.search-result-item{padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.search-result-item:last-child{border-bottom:none;}
.search-result-title{color:var(--accent2);font-size:13px;font-weight:600;margin-bottom:2px;}
.search-result-title a{color:var(--accent2);text-decoration:none;}
.search-result-title a:hover{text-decoration:underline;}
.search-result-snippet{color:var(--text-muted);font-size:12px;line-height:1.5;}
.search-result-url{color:#4a4a6a;font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* INPUT */
.input-area{padding:14px 18px 18px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;}
.input-container{max-width:760px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;transition:border-color 0.2s;}
.input-container:focus-within{border-color:var(--accent);}
#message-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;line-height:1.5;resize:none;max-height:150px;min-height:22px;}
#message-input::placeholder{color:var(--text-muted);}
#mic-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;color:var(--text-muted);}
#mic-btn:hover{border-color:var(--accent);color:var(--accent);}
#mic-btn.recording{background:rgba(248,113,113,0.15);border-color:var(--danger);color:var(--danger);animation:micPulse 1s ease-in-out infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.4);}50%{box-shadow:0 0 0 7px rgba(248,113,113,0);}}
#auto-speak-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;color:var(--text-muted);}
#auto-speak-btn:hover{border-color:var(--accent2);color:var(--accent2);}
#auto-speak-btn.active{color:var(--accent2);border-color:var(--accent2);background:rgba(79,209,197,0.1);}
/* Search toggle button in input */
#search-toggle-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;color:var(--text-muted);}
#search-toggle-btn:hover{border-color:var(--search-color);color:var(--search-color);}
#search-toggle-btn.active{color:var(--search-color);border-color:var(--search-color);background:rgba(246,173,85,0.1);}
#send-btn{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#5a4fcf);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;color:#fff;}
#send-btn:hover{opacity:0.85;transform:scale(1.05);}
#send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.voice-bar{display:flex;align-items:center;justify-content:space-between;max-width:760px;margin:8px auto 0;gap:8px;}
#voice-mode-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:linear-gradient(135deg,rgba(124,106,247,0.15),rgba(79,209,197,0.1));border:1px solid rgba(124,106,247,0.3);border-radius:20px;color:var(--accent);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
#voice-mode-btn:hover{background:rgba(124,106,247,0.25);}
#voice-mode-btn.active{background:rgba(248,113,113,0.15);border-color:var(--danger);color:var(--danger);}
.voice-hint{font-size:11px;color:var(--text-muted);}

/* VOICE OVERLAY */
#voice-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.93);backdrop-filter:blur(14px);z-index:200;align-items:center;justify-content:center;flex-direction:column;}
#voice-overlay.active{display:flex;}
.voice-card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:44px 38px;text-align:center;width:300px;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 0 80px rgba(124,106,247,0.2);}
.voice-icon{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;animation:voicePulse 2s ease-in-out infinite;}
@keyframes voicePulse{0%,100%{box-shadow:0 0 0 0 rgba(124,106,247,0.4);}50%{box-shadow:0 0 0 18px rgba(124,106,247,0);}}
.voice-waves{display:flex;align-items:center;gap:4px;height:44px;}
.wave-bar{width:4px;background:var(--accent);border-radius:3px;height:8px;}
.voice-waves.listening .wave-bar{animation:waveDance 0.7s ease-in-out infinite;}
.voice-waves.listening .wave-bar:nth-child(2){animation-delay:0.1s;background:var(--accent2);}
.voice-waves.listening .wave-bar:nth-child(3){animation-delay:0.2s;}
.voice-waves.listening .wave-bar:nth-child(4){animation-delay:0.3s;background:var(--accent2);}
.voice-waves.listening .wave-bar:nth-child(5){animation-delay:0.2s;}
.voice-waves.listening .wave-bar:nth-child(6){animation-delay:0.1s;background:var(--accent2);}
@keyframes waveDance{0%,100%{height:6px;}50%{height:36px;}}
.voice-status{font-size:16px;font-weight:700;color:var(--text);}
.voice-transcript{font-size:13px;color:var(--text-muted);min-height:18px;font-style:italic;max-width:220px;line-height:1.4;}
.voice-stop-btn{padding:9px 22px;background:rgba(248,113,113,0.15);color:var(--danger);border:1px solid var(--danger);border-radius:20px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.voice-stop-btn:hover{background:rgba(248,113,113,0.28);}

/* THEME TOGGLE */
#theme-toggle-btn{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s;flex-shrink:0;}
#theme-toggle-btn:hover{border-color:var(--accent);transform:scale(1.08);}

/* Light mode adjustments */
body.light-mode .msg-bubble pre{background:rgba(0,0,0,0.06);border-color:var(--border);}
body.light-mode .msg-bubble code{background:rgba(106,88,232,0.1);}
body.light-mode .login-card{box-shadow:0 8px 40px rgba(0,0,0,0.12);}
body.light-mode #voice-overlay{background:rgba(240,240,248,0.93);}
body.light-mode .voice-card{box-shadow:0 0 80px rgba(106,88,232,0.15);}
body.light-mode .search-results-card{background:rgba(200,112,32,0.05);}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo-mark">✦</div>
    <div class="login-title">SK Assistant</div>
    <div class="login-sub">Designed by Shivam Sir • DeepSeek R1 + Google Search<br/>Login karein aur shuru karein</div>
    <button id="google-signin-btn" onclick="googleSignIn()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
